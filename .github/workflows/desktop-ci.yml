name: Desktop CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "apps/desktop/**"
      - "drafts/**"
      - ".github/workflows/desktop-ci.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test coverage
        id: coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Build desktop app
        id: build
        if: always()
        continue-on-error: true
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-coverage
          path: apps/desktop/coverage
          if-no-files-found: warn

      - name: Publish CI summary
        if: always()
        uses: actions/github-script@v7
        env:
          COVERAGE_STEP_OUTCOME: ${{ steps.coverage.outcome }}
          BUILD_STEP_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const coveragePath = path.join(process.env.GITHUB_WORKSPACE, "apps/desktop/coverage/coverage-summary.json");
            let summary = null;

            if (fs.existsSync(coveragePath)) {
              summary = JSON.parse(fs.readFileSync(coveragePath, "utf8"));
            }

            const testOutcome = process.env.COVERAGE_STEP_OUTCOME ?? "unknown";
            const buildOutcome = process.env.BUILD_STEP_OUTCOME ?? "unknown";
            const total = summary?.total ?? null;

            await core.summary
              .addHeading("TimeAura Desktop CI")
              .addTable([
                [
                  { data: "检查项", header: true },
                  { data: "结果", header: true },
                ],
                ["测试与覆盖率", testOutcome],
                ["构建", buildOutcome],
              ])
              .addRaw("\n")
              .addHeading("Coverage Summary", 2);

            if (total) {
              await core.summary.addTable([
                [
                  { data: "Metric", header: true },
                  { data: "Pct", header: true },
                  { data: "Covered", header: true },
                  { data: "Total", header: true },
                ],
                ["Lines", `${total.lines.pct}%`, `${total.lines.covered}`, `${total.lines.total}`],
                ["Statements", `${total.statements.pct}%`, `${total.statements.covered}`, `${total.statements.total}`],
                ["Functions", `${total.functions.pct}%`, `${total.functions.covered}`, `${total.functions.total}`],
                ["Branches", `${total.branches.pct}%`, `${total.branches.covered}`, `${total.branches.total}`],
              ]);
            } else {
              await core.summary.addRaw("Coverage summary is not available for this run.\n");
            }

            await core.summary
              .addRaw("\nArtifacts:\n")
              .addList([
                "desktop-coverage: HTML coverage report, lcov, and JSON summary.",
              ])
              .write();

      - name: Comment PR with CI summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COVERAGE_STEP_OUTCOME: ${{ steps.coverage.outcome }}
          BUILD_STEP_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const marker = "<!-- timeaura-desktop-ci -->";
            const coveragePath = path.join(process.env.GITHUB_WORKSPACE, "apps/desktop/coverage/coverage-summary.json");
            let coverageLines = "- Coverage summary unavailable";

            if (fs.existsSync(coveragePath)) {
              const summary = JSON.parse(fs.readFileSync(coveragePath, "utf8"));
              const total = summary.total;
              coverageLines = [
                `- Lines: ${total.lines.pct}% (${total.lines.covered}/${total.lines.total})`,
                `- Statements: ${total.statements.pct}% (${total.statements.covered}/${total.statements.total})`,
                `- Functions: ${total.functions.pct}% (${total.functions.covered}/${total.functions.total})`,
                `- Branches: ${total.branches.pct}% (${total.branches.covered}/${total.branches.total})`,
              ].join("\n");
            }

            const body = [
              marker,
              "## TimeAura Desktop CI",
              "",
              `- Test & Coverage: **${process.env.COVERAGE_STEP_OUTCOME ?? "unknown"}**`,
              `- Build: **${process.env.BUILD_STEP_OUTCOME ?? "unknown"}**`,
              "",
              "### Coverage",
              coverageLines,
              "",
              "Artifacts: `desktop-coverage`",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.user?.type === "Bot" && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail workflow when checks fail
        if: always() && (steps.coverage.outcome != 'success' || steps.build.outcome != 'success')
        run: |
          echo "Desktop CI checks failed."
          exit 1
